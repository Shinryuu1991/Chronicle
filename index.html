<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker — Daily XP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0f1a" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon">◈</div>
        <div class="brand-text">
          <span class="brand-title">HABIT TRACKER</span>
          <span class="brand-sub" id="date-display">Loading...</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-manage" title="Manage Tasks" aria-label="Manage tasks">⊞</button>
        <button class="icon-btn" id="btn-reset" title="Reset Today" aria-label="Reset today">↺</button>
      </div>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="app-main">

    <!-- XP Dashboard -->
    <section class="xp-section">
      <div class="xp-numbers">
        <div class="xp-current">
          <span id="xp-earned">0</span>
          <span class="xp-unit">XP</span>
        </div>
        <div class="xp-divider">/</div>
        <div class="xp-target-display">
          <span id="xp-target-display">100</span>
          <span class="xp-unit">DAILY</span>
        </div>
      </div>
      <div class="xp-bar-track">
        <div class="xp-bar-fill" id="xp-bar"></div>
        <div class="xp-bar-glow" id="xp-bar-glow"></div>
      </div>
      <div class="xp-meta-row">
        <span class="xp-pct" id="xp-pct">0%</span>
        <span class="xp-overflow hidden" id="xp-overflow">+0 OVERFLOW</span>
      </div>
    </section>

    <!-- Stats Row -->
    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-body">
          <div class="stat-val" id="stat-streak">0</div>
          <div class="stat-label">STREAK</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✓</div>
        <div class="stat-body">
          <div class="stat-val" id="stat-done">0</div>
          <div class="stat-label">DONE TODAY</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">◈</div>
        <div class="stat-body">
          <div class="stat-val" id="stat-best">0</div>
          <div class="stat-label">BEST STREAK</div>
        </div>
      </div>
    </section>

    <!-- Week Heatmap -->
    <section class="week-section">
      <div class="section-label">THIS WEEK</div>
      <div class="week-grid" id="week-grid"></div>
    </section>

    <!-- Category Filter -->
    <section class="filter-section">
      <div class="filter-tabs" id="filter-tabs"></div>
    </section>

    <!-- Task List -->
    <section class="tasks-section">
      <div class="tasks-header">
        <span class="section-label">TASKS</span>
        <span class="tasks-count" id="tasks-remaining">0 remaining</span>
      </div>
      <div class="task-list" id="task-list"></div>
    </section>

  </main>

  <!-- ── MANAGE MODAL ── -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal-manage">
      <div class="modal-header">
        <span class="modal-title">MANAGE TASKS</span>
        <button class="modal-close" id="btn-modal-close">✕</button>
      </div>

      <!-- Add Task -->
      <div class="modal-section">
        <div class="modal-section-label">ADD NEW TASK</div>
        <div class="add-task-form">
          <input type="text" id="new-task-name" placeholder="Task name..." maxlength="60" />
          <div class="add-task-row2">
            <select id="new-task-cat"></select>
            <input type="number" id="new-task-xp" placeholder="XP" min="1" max="200" />
            <label class="toggle-label" title="One-off tasks are removed after completion">
              <input type="checkbox" id="new-task-oneoff" />
              <span class="toggle-text">One-off</span>
            </label>
          </div>
          <button class="btn-primary" id="btn-add-task">ADD TASK</button>
        </div>
      </div>

      <!-- Settings -->
      <div class="modal-section">
        <div class="modal-section-label">SETTINGS</div>
        <div class="settings-row">
          <label class="settings-label">Daily XP Target</label>
          <input type="number" id="settings-target" min="10" max="1000" />
          <button class="btn-secondary" id="btn-save-settings">SAVE</button>
        </div>
      </div>

      <!-- Edit / Delete Existing Tasks -->
      <div class="modal-section">
        <div class="modal-section-label">EDIT TASKS</div>
        <div class="edit-task-list" id="edit-task-list"></div>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast hidden" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
