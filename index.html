<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1208" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon">⚔</div>
        <div class="brand-text">
          <span class="brand-title">Quest Log</span>
          <span class="brand-sub" id="date-display">Loading...</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-theme" title="Toggle Day/Night" aria-label="Toggle day/night mode">☽</button>
        <button class="icon-btn" id="btn-manage" title="Manage Quests" aria-label="Manage quests">✦</button>
        <button class="icon-btn" id="btn-reset" title="Reset Today" aria-label="Reset today">↺</button>
      </div>
    </div>
    <!-- XP bar lives in the header so it stays visible while scrolling -->
    <div class="header-xp">
      <div class="header-xp-inner">
        <div class="xp-top-row">
          <div class="xp-numbers">
            <div class="xp-current">
              <span id="xp-earned">0</span>
              <span class="xp-unit">XP</span>
            </div>
            <div class="xp-divider">/</div>
            <div class="xp-target-display">
              <span id="xp-target-display">80</span>
              <span class="xp-unit">DAILY</span>
            </div>
          </div>
          <div class="level-badge-wrap" id="level-badge-wrap" title="Your level"></div>
        </div>
        <div class="xp-bar-track">
          <div class="xp-bar-fill" id="xp-bar"></div>
          <div class="xp-bar-glow" id="xp-bar-glow"></div>
        </div>
        <div class="xp-meta-row">
          <span class="xp-pct" id="xp-pct">0%</span>
          <span class="xp-overflow hidden" id="xp-overflow">+0 OVERFLOW</span>
        </div>
        <div class="renown-row">
          <span class="renown-label">Renown</span>
          <div class="renown-bar-track">
            <div class="renown-bar-fill" id="renown-bar"></div>
          </div>
          <span class="renown-label" id="renown-label">0 / 25</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="app-main">

    <!-- Stats Row -->
    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-body">
          <div class="stat-val" id="stat-streak">0</div>
          <div class="stat-label">STREAK</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✓</div>
        <div class="stat-body">
          <div class="stat-val" id="stat-done">0</div>
          <div class="stat-label">DONE TODAY</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">◈</div>
        <div class="stat-body">
          <div class="stat-val" id="stat-best">0</div>
          <div class="stat-label">BEST STREAK</div>
        </div>
      </div>
    </section>

    <!-- Week Heatmap -->
    <section class="week-section">
      <div class="section-label">Chronicles of the Week</div>
      <div class="week-grid" id="week-grid"></div>
    </section>

    <!-- Category Filter -->
    <section class="filter-section">
      <div class="filter-tabs" id="filter-tabs"></div>
    </section>

    <!-- Task List -->
    <section class="tasks-section">
      <div class="tasks-header">
        <span class="section-label">Quests & Deeds</span>
        <span class="tasks-count" id="tasks-remaining">0 remaining</span>
      </div>
      <div class="task-list" id="task-list"></div>
    </section>

  </main>

  <!-- ── MANAGE MODAL ── -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal-manage">
      <div class="modal-header">
        <span class="modal-title">Manage Quests</span>
        <button class="modal-close" id="btn-modal-close">✕</button>
      </div>

      <!-- Add Task -->
      <div class="modal-section">
        <div class="modal-section-label">Inscribe a New Quest</div>
        <div class="add-task-form">
          <input type="text" id="new-task-name" placeholder="Name this quest..." maxlength="60" />
          <div class="add-task-row2">
            <select id="new-task-cat"></select>
            <input type="number" id="new-task-xp" placeholder="XP" min="1" max="200" />
            <label class="toggle-label" title="One-off tasks are removed after completion">
              <input type="checkbox" id="new-task-oneoff" />
              <span class="toggle-text">One-off</span>
            </label>
          </div>
          <button class="btn-primary" id="btn-add-task">Inscribe Quest</button>
        </div>
      </div>

      <!-- Settings -->
      <div class="modal-section">
        <div class="modal-section-label">Tome Settings</div>
        <div class="settings-row">
          <label class="settings-label">Daily XP Target</label>
          <input type="number" id="settings-target" min="10" max="1000" />
          <button class="btn-secondary" id="btn-save-settings">Save</button>
        </div>
      </div>

      <!-- Edit / Delete Existing Tasks -->
      <div class="modal-section">
        <div class="modal-section-label">Edit Quests</div>
        <div class="edit-task-list" id="edit-task-list"></div>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast hidden" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
